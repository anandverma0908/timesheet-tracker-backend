version: "3.9"

services:

  # ── PostgreSQL 15 with pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: trackly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trackly
      POSTGRES_PASSWORD: trackly
      POSTGRES_DB: trackly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackly"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Ollama (local LLM) ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: trackly-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── Trackly API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trackly-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://trackly:trackly@postgres:5432/trackly
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      NOVA_PROVIDER: ${NOVA_PROVIDER:-ollama}
      NOVA_BASE_URL: http://ollama:11434
      NOVA_MODEL: ${NOVA_MODEL:-llama3.1:8b}
      NOVA_TEMPERATURE: ${NOVA_TEMPERATURE:-0.3}
      NOVA_MAX_TOKENS: ${NOVA_MAX_TOKENS:-1500}
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      DEBUG: ${DEBUG:-false}
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  # ── MailHog (local SMTP + web UI) ───────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: trackly-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
  ollama_data:
  uploads:
